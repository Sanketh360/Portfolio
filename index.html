<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanketh K Kottary | Portfolio</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Boxicons for Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header / Navbar -->
    <header class="header">
        <a href="#home" class="logo">Sanketh.</a>
        <i class='bx bx-menu' id="menu-icon"></i>
        <nav class="navbar">
            <a href="#home" class="active">Home</a>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- Home Section -->
    <section class="home" id="home">
        <div class="home-content">
            <h3>Hello, It's Me</h3>
            <h1 id="hero-name">Loading...</h1>
            <h3>And I'm a <span class="multiple-text"></span></h3>
            <p id="hero-summary">Loading summary...</p>
            <div class="social-media">
                <a href="#" id="linkedin-link" target="_blank"><i class='bx bxl-linkedin'></i></a>
                <a href="#" id="github-link" target="_blank"><i class='bx bxl-github'></i></a>
            </div>
            <a href="assets/Sanketh_Resume.pdf" download="Sanketh_Resume.pdf" type="application/pdf" class="btn"
                id="resume-btn">Download Resume</a>
        </div>
        <div class="home-img">
            <div class="img-box">
                <div class="img-item">
                    <img src="assets/profile.jpg" alt="Profile Picture" id="profile-img">
                </div>
            </div>
        </div>
    </section>

    <!-- About Section -->
    <section class="about" id="about">
        <div class="about-img">
            <img src="assets/profile.jpg" alt="Profile Picture">
        </div>
        <div class="about-content">
            <h2 class="heading">About <span>Me</span></h2>
            <h3>Experience & Education</h3>
            <div class="about-tabs-container">
                <div class="about-tabs">
                    <button class="tab-btn active" onclick="openTab('experience')">Experience</button>
                    <button class="tab-btn" onclick="openTab('education')">Education</button>
                    <button class="tab-btn" onclick="openTab('certifications')">Certifications</button>
                </div>

                <div id="experience" class="tab-content active-tab" id="experience-container">
                    <!-- Populated by JS -->
                </div>

                <div id="education" class="tab-content" id="education-container">
                    <!-- Populated by JS -->
                </div>

                <div id="certifications" class="tab-content" id="certifications-container">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
    </section>

    <!-- Skills Section -->
    <section class="skills" id="skills">
        <h2 class="heading">My <span>Skills</span></h2>
        <div class="skills-container" id="skills-container">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Projects Section -->
    <section class="projects" id="projects">
        <h2 class="heading">Latest <span>Projects</span></h2>
        <div class="projects-container" id="projects-container">
            <!-- Populated by JS -->
        </div>
    </section>

    <!-- Contact Section -->
    <section class="contact" id="contact">
        <h2 class="heading">Contact <span>Me!</span></h2>
        <form action="#" id="contact-form">
            <div class="input-box">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-box">
                <input type="number" placeholder="Mobile Number" required>
                <input type="text" placeholder="Email Subject" required>
            </div>
            <textarea name="" id="" cols="30" rows="10" placeholder="Your Message" required></textarea>
            <input type="submit" value="Send Message" class="btn">
        </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-text">
            <p>Copyright &copy; 2026 by Sanketh K Kottary | All Rights Reserved.</p>
        </div>
        <div class="footer-iconTop">
            <a href="#home"><i class='bx bx-up-arrow-alt'></i></a>
        </div>
    </footer>

    <!-- Typed JS -->
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>

</html>
